name: CI (modules)

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:
    inputs:
      module:
        description: "Which module to run"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - data_load
          - data_quality_analysis
          - data_research
          - visualization

permissions:
  contents: read

jobs:
  changes:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      data_load: ${{ steps.filter.outputs.data_load }}
      data_quality_analysis: ${{ steps.filter.outputs.data_quality_analysis }}
      data_research: ${{ steps.filter.outputs.data_research }}
      visualization: ${{ steps.filter.outputs.visualization }}
      common: ${{ steps.filter.outputs.common }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Detect changed files
        id: filter
        uses: dorny/paths-filter@v4
        with:
          filters: |
            data_load:
              - 'src/data_load/**'
            data_quality_analysis:
              - 'src/data_quality_analysis/**'
            data_research:
              - 'src/data_research/**'
            visualization:
              - 'src/visualization/**'
            common:
              - '.github/workflows/**'
              - 'requirements.txt'

  prepare-matrix:
    needs: changes
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.make.outputs.matrix }}
      has_work: ${{ steps.make.outputs.has_work }}
    steps:
      - name: Build matrix
        id: make
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          SELECTED_MODULE: ${{ github.event.inputs.module }}
          DATA_LOAD: ${{ needs.changes.outputs.data_load }}
          DATA_QUALITY_ANALYSIS: ${{ needs.changes.outputs.data_quality_analysis }}
          DATA_RESEARCH: ${{ needs.changes.outputs.data_research }}
          VISUALIZATION: ${{ needs.changes.outputs.visualization }}
          COMMON: ${{ needs.changes.outputs.common }}
        run: |
          python - <<'PY'
          import json
          import os

          modules = [
              "data_load",
              "data_quality_analysis",
              "data_research",
              "visualization",
          ]

          event_name = os.getenv("EVENT_NAME", "")
          selected = os.getenv("SELECTED_MODULE", "")
          chosen = []

          if event_name == "workflow_dispatch":
              if selected in ("", "all"):
                  chosen = modules
              else:
                  chosen = [selected]
          else:
              if os.getenv("COMMON") == "true":
                  chosen = modules
              else:
                  mapping = {
                      "data_load": os.getenv("DATA_LOAD"),
                      "data_quality_analysis": os.getenv("DATA_QUALITY_ANALYSIS"),
                      "data_research": os.getenv("DATA_RESEARCH"),
                      "visualization": os.getenv("VISUALIZATION"),
                  }
                  chosen = [m for m in modules if mapping.get(m) == "true"]

          matrix = {"include": [{"module": m} for m in chosen]}
          has_work = "true" if chosen else "false"

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as f:
              f.write(f"matrix={json.dumps(matrix)}\n")
              f.write(f"has_work={has_work}\n")
          PY

  run-modules:
    needs: prepare-matrix
    if: ${{ needs.prepare-matrix.outputs.has_work == 'true' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.prepare-matrix.outputs.matrix) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Prepare workspace
        run: |
          mkdir -p data/raw
          mkdir -p reports
          mkdir -p reports/figures
          mkdir -p artifacts/${{ matrix.module }}
          rm -f data/raw/dataset_*
          rm -f reports/*.csv
          rm -f reports/*.md
          rm -f reports/figures/*.png

      - name: Download input data
        if: ${{ matrix.module != 'data_load' }}
        shell: bash
        run: |
          set -euo pipefail
          python src/data_load/download_data.py 2>&1 | tee artifacts/${{ matrix.module }}/prepare_data.log

      - name: Run selected module
        shell: bash
        run: |
          set -euo pipefail
          case "${{ matrix.module }}" in
            data_load)
              python src/data_load/download_data.py 2>&1 | tee artifacts/${{ matrix.module }}/run.log
              cp -v data/raw/* artifacts/${{ matrix.module }}/ 2>/dev/null || true
              ;;
            data_quality_analysis)
              python src/data_quality_analysis/check_quality.py 2>&1 | tee artifacts/${{ matrix.module }}/run.log
              cp -v reports/missing_values.csv artifacts/${{ matrix.module }}/ 2>/dev/null || true
              cp -v reports/data_quality_report.md artifacts/${{ matrix.module }}/ 2>/dev/null || true
              ;;
            data_research)
              python src/data_research/research.py 2>&1 | tee artifacts/${{ matrix.module }}/run.log
              cp -v reports/eda_summary.csv artifacts/${{ matrix.module }}/ 2>/dev/null || true
              cp -v reports/correlation.csv artifacts/${{ matrix.module }}/ 2>/dev/null || true
              cp -v reports/model_report.md artifacts/${{ matrix.module }}/ 2>/dev/null || true
              ;;
            visualization)
              python src/visualization/visualize.py 2>&1 | tee artifacts/${{ matrix.module }}/run.log
              cp -v reports/figures/*.png artifacts/${{ matrix.module }}/ 2>/dev/null || true
              ;;
          esac

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: artifacts-${{ matrix.module }}
          path: artifacts/${{ matrix.module }}
          if-no-files-found: warn